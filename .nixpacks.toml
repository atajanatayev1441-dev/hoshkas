[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
cmds = [
  "npm install",
  "cd client && npm install",
  "cd server && npm install"
]

[phases.build]
cmds = [
  "cd client && npm run build",
  "cd server && npx prisma generate"
]

[start]
cmd = "cd server && npx prisma db push --accept-data-loss && node index.js"
